# ── 变更记录 ──────────────────────────────────────────────────────────────
# 2026-07-01  ridge.lambda_grid: logspace(-2,4,13)=[0.01,1e4] → logspace(-2,7,19)=[0.01,1e7]
#   依据：M3a 盲态核查（scripts/m3a_blind_check.py，只用 outer training + inner CV，
#   不碰 held-out r）发现原网格下**有信号体素**（inner-CV score>0.10，n≈18000-20000，
#   cv_max~0.5）100% 撞上界 1e4。根因：PCA-100 输出的 PC scores 未标准化，方差远大于
#   native 的单位方差 z-score 特征，所需正则化强度大几个数量级。扩到 [0.01,1e7] 后
#   信号体素边界命中率降至 0.000（3 折一致）。保持每 0.5 log10 分辨率（点数 13→19）。
#   选择扩网格（方案A）而非 PCA 白化（方案B），因扩网格已使信号体素 0% 撞界即足够。
#   此修改在看到任何 outer held-out r 之前完成，符合 M3a 纪律。freeze tag 见 git。
# ──────────────────────────────────────────────────────────────────────────
context_lengths_H:
- 8
- 32
- 128
first_eligible_target_index_0based: 128
window_definition: H preceding words + target word = H+1 tokens total
state_reset_per_window: true
transformer_reuse_external_kv_cache: false
primary_layers:
  pythia: 8
  rwkv: 8
  mamba: 16
  awd_lstm: 1
robustness_layers:
  pythia: 11
  rwkv: 11
  mamba: 23
  awd_lstm: 2
pca:
  n_components: 100
  fit_scope: outer_training_stories_only
  apply_before_fir: true
  svd_solver: full
ridge:
  solver: himalaya
  alpha_scope: per_voxel
  lambda_grid: logspace(-2, 7, 19)   # M3a 后扩上界，见顶部变更记录
  inner_folds: 2
  selection_metric: validation_pearson_r
  tie_break_rule: prefer_larger_lambda
scoring:
  voxel_metric: pearson_r
  transform_before_roi_average: fisher_z
  fold_summary: effective_tr_weighted_mean
heldout_score_after_story_seconds: 100
fir_delays_seconds:
- 2
- 4
- 6
- 8
negative_control:
  time_shift_seconds: 40
  shift_within_each_story: true
  circular_shift: false
  edge_policy: invalid_and_drop
seeds:
  fold_split: 20260629
  pca: 20260630
  bootstrap: 20260701
